<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falafel Kingdom — Co-op Lobby</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0a0a12 0%, #12162a 50%, #1a1f35 100%);
            color: #fff;
            user-select: none;
        }

        /* Stars */
        .menu-stars { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .menu-star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.6; }
        }

        /* Layout */
        .menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        /* Logo canvas */
        .menu-logo { width: 120px; height: 120px; margin-bottom: 10px; }

        /* Typography */
        h1 {
            font-size: 56px; color: #fff; margin: 0 0 10px 0;
            text-transform: uppercase; letter-spacing: 6px; font-weight: 300;
        }
        .subtitle {
            font-size: 22px; color: #c9a227; margin: 0 0 40px 0;
            font-weight: 300; letter-spacing: 4px; text-transform: uppercase;
        }
        .label {
            font-size: 14px; color: rgba(255,255,255,0.5); text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 12px; font-weight: 400;
        }

        /* Buttons */
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 18px 50px;
            font-size: 14px;
            border-radius: 2px;
            cursor: pointer;
            margin: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-width: 260px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }
        button::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        button:hover::before { transform: translateX(100%); }
        button:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button.primary {
            background: linear-gradient(135deg, #c9a227 0%, #f4d03f 50%, #c9a227 100%);
            border: none;
            color: #1a1a2e;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(201, 162, 39, 0.3);
        }
        button.primary:hover {
            box-shadow: 0 6px 30px rgba(201, 162, 39, 0.5);
            transform: translateY(-2px);
        }
        button.primary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        button.secondary {
            background: transparent;
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.2);
        }
        button.secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.4);
        }

        /* Room code display */
        .room-code {
            font-size: 56px;
            font-family: 'Courier New', monospace;
            color: #f4d03f;
            letter-spacing: 14px;
            margin: 8px 0 6px 0;
            cursor: pointer;
            padding: 8px 20px;
            border: 2px dashed rgba(201, 162, 39, 0.3);
            border-radius: 6px;
            transition: border-color 0.3s, background 0.3s;
        }
        .room-code:hover {
            border-color: rgba(201, 162, 39, 0.6);
            background: rgba(201, 162, 39, 0.05);
        }
        .copy-hint {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            margin-bottom: 24px;
            transition: color 0.3s;
        }
        .copy-hint.copied { color: #4caf50; }

        /* Waiting spinner */
        .waiting {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 2px;
            margin: 16px 0 24px 0;
        }
        .spinner-dots::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Join input */
        .code-input {
            font-size: 42px;
            font-family: 'Courier New', monospace;
            color: #f4d03f;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            text-align: center;
            width: 200px;
            padding: 10px 16px;
            letter-spacing: 10px;
            text-transform: uppercase;
            outline: none;
            caret-color: #f4d03f;
            transition: border-color 0.3s;
            margin: 8px 0 16px 0;
        }
        .code-input:focus { border-color: rgba(201, 162, 39, 0.6); }
        .code-input.error { border-color: #e07070; animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* Error text */
        .error-text {
            color: #e07070;
            font-size: 13px;
            letter-spacing: 1px;
            margin-top: 8px;
            min-height: 20px;
        }

        /* Status message (connected) */
        .status-msg {
            color: #4caf50;
            font-size: 16px;
            letter-spacing: 2px;
            margin: 20px 0;
        }

        /* Single player link */
        .sp-link {
            margin-top: 36px;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            letter-spacing: 1px;
            text-decoration: none;
            transition: color 0.3s;
        }
        .sp-link:hover { color: rgba(255,255,255,0.7); }

        /* Footer */
        .footer {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.2); font-size: 11px; pointer-events: none;
            font-weight: 300; letter-spacing: 2px;
        }

        /* View transitions */
        .view { display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }

        /* Fade-in helper */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.4s ease-out both; }
    </style>
</head>
<body>
    <!-- Stars background -->
    <div class="menu-stars" id="menu-stars"></div>

    <!-- Main menu content -->
    <div class="menu">
        <!-- Main buttons view -->
        <div class="view" id="view-main">
            <canvas id="falafel-logo" class="menu-logo" width="120" height="120"></canvas>
            <h1>Falafel Kingdom</h1>
            <div class="subtitle">Co-op Adventure</div>
            <button class="primary" onclick="showHost()">Host Game</button>
            <button class="secondary" onclick="showJoin()">Join Game</button>
            <a href="singleplayer.html" class="sp-link">&larr; Single Player</a>
        </div>

        <!-- Host view -->
        <div class="view hidden" id="view-host">
            <canvas id="falafel-logo-host" class="menu-logo" width="120" height="120"></canvas>
            <h1>Falafel Kingdom</h1>
            <div class="label">Your Room Code</div>
            <div class="room-code" id="room-code" onclick="copyCode()" title="Click to copy">----</div>
            <div class="copy-hint" id="copy-hint">click to copy</div>
            <div class="waiting">Waiting for player 2<span class="spinner-dots"></span></div>
            <div class="status-msg hidden" id="host-status"></div>
            <button class="secondary" onclick="cancelHost()">Cancel</button>
        </div>

        <!-- Join view -->
        <div class="view hidden" id="view-join">
            <canvas id="falafel-logo-join" class="menu-logo" width="120" height="120"></canvas>
            <h1>Falafel Kingdom</h1>
            <div class="label">Enter Room Code</div>
            <input type="text" class="code-input" id="join-input" maxlength="4" placeholder="----" autocomplete="off" spellcheck="false">
            <div class="error-text" id="join-error"></div>
            <button class="primary" id="join-btn" onclick="doJoin()" disabled>Join</button>
            <button class="secondary" onclick="cancelJoin()">Back</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">FALAFEL KINGDOM &copy; 2025 &mdash; Powered by friendship and hummus</div>

    <script>
    (function() {
        // ── Stars ──
        const starsContainer = document.getElementById('menu-stars');
        for (let i = 0; i < 25; i++) {
            const star = document.createElement('div');
            star.className = 'menu-star';
            const size = Math.random() * 3 + 1;
            star.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;animation-delay:' + (Math.random()*3) + 's;animation-duration:' + (1.5+Math.random()*2.5) + 's;';
            starsContainer.appendChild(star);
        }

        // ── Falafel logo animation ──
        function initFalafelCanvas(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            function draw(time) {
                ctx.clearRect(0, 0, 120, 120);
                const floatY = Math.sin(time * 0.003) * 5;

                // Glow
                const gradient = ctx.createRadialGradient(60, 60 + floatY, 30, 60, 60 + floatY, 60);
                gradient.addColorStop(0, 'rgba(201, 162, 39, 0.3)');
                gradient.addColorStop(1, 'rgba(201, 162, 39, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 120, 120);

                // Body
                ctx.beginPath();
                ctx.arc(60, 60 + floatY, 40, 0, Math.PI * 2);
                const bodyGrad = ctx.createRadialGradient(45, 45 + floatY, 5, 60, 60 + floatY, 45);
                bodyGrad.addColorStop(0, '#e8c080');
                bodyGrad.addColorStop(1, '#a67c52');
                ctx.fillStyle = bodyGrad;
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#2c2c2c';
                ctx.beginPath();
                ctx.arc(48, 55 + floatY, 6, 0, Math.PI * 2);
                ctx.arc(72, 55 + floatY, 6, 0, Math.PI * 2);
                ctx.fill();

                // Eye shine
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(50, 53 + floatY, 2, 0, Math.PI * 2);
                ctx.arc(74, 53 + floatY, 2, 0, Math.PI * 2);
                ctx.fill();

                // Smile
                ctx.strokeStyle = '#5c4030';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(60, 62 + floatY, 12, 0.2, Math.PI - 0.2);
                ctx.stroke();

                // Blush
                ctx.fillStyle = 'rgba(255, 150, 150, 0.4)';
                ctx.beginPath();
                ctx.arc(38, 68 + floatY, 8, 0, Math.PI * 2);
                ctx.arc(82, 68 + floatY, 8, 0, Math.PI * 2);
                ctx.fill();

                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        }

        initFalafelCanvas('falafel-logo');
        initFalafelCanvas('falafel-logo-host');
        initFalafelCanvas('falafel-logo-join');

        // ── State ──
        let peer = null;
        let conn = null;
        let timeoutId = null;

        const viewMain = document.getElementById('view-main');
        const viewHost = document.getElementById('view-host');
        const viewJoin = document.getElementById('view-join');
        const roomCodeEl = document.getElementById('room-code');
        const copyHintEl = document.getElementById('copy-hint');
        const hostStatusEl = document.getElementById('host-status');
        const joinInput = document.getElementById('join-input');
        const joinBtn = document.getElementById('join-btn');
        const joinError = document.getElementById('join-error');

        function showView(view) {
            viewMain.classList.add('hidden');
            viewHost.classList.add('hidden');
            viewJoin.classList.add('hidden');
            view.classList.remove('hidden');
            view.classList.add('fade-in');
        }

        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
            let code = '';
            for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        function cleanupPeer() {
            if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
            if (conn) { try { conn.close(); } catch(e) {} conn = null; }
            if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
        }

        // ── HOST ──
        window.showHost = function() {
            const code = generateCode();
            roomCodeEl.textContent = code;
            copyHintEl.textContent = 'click to copy';
            copyHintEl.classList.remove('copied');
            hostStatusEl.classList.add('hidden');
            showView(viewHost);

            cleanupPeer();
            peer = new Peer('fk-' + code);

            peer.on('open', function() {
                // ready, waiting for connections
            });

            peer.on('connection', function(connection) {
                conn = connection;
                if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
                hostStatusEl.textContent = 'Player 2 connected! Starting...';
                hostStatusEl.classList.remove('hidden');

                setTimeout(function() {
                    sessionStorage.setItem('fk_room', JSON.stringify({ code: code, role: 'host' }));
                    window.location.href = 'game.html';
                }, 1000);
            });

            peer.on('error', function(err) {
                if (err.type === 'unavailable-id') {
                    // code collision — try again
                    cancelHost();
                    showHost();
                }
            });
        };

        window.copyCode = function() {
            const code = roomCodeEl.textContent;
            if (code === '----') return;
            navigator.clipboard.writeText(code).then(function() {
                copyHintEl.textContent = 'copied!';
                copyHintEl.classList.add('copied');
                setTimeout(function() {
                    copyHintEl.textContent = 'click to copy';
                    copyHintEl.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                // Fallback: select text
                copyHintEl.textContent = 'copied!';
                copyHintEl.classList.add('copied');
            });
        };

        window.cancelHost = function() {
            cleanupPeer();
            showView(viewMain);
        };

        // ── JOIN ──
        window.showJoin = function() {
            joinInput.value = '';
            joinError.textContent = '';
            joinInput.classList.remove('error');
            joinBtn.disabled = true;
            showView(viewJoin);
            setTimeout(function() { joinInput.focus(); }, 100);
        };

        joinInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');
            joinBtn.disabled = this.value.length !== 4;
            joinError.textContent = '';
            joinInput.classList.remove('error');
        });

        joinInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && this.value.length === 4) doJoin();
        });

        window.doJoin = function() {
            const code = joinInput.value.trim().toUpperCase();
            if (code.length !== 4) return;

            joinBtn.disabled = true;
            joinError.textContent = '';
            joinInput.classList.remove('error');

            cleanupPeer();
            peer = new Peer();

            peer.on('open', function() {
                conn = peer.connect('fk-' + code, { reliable: true });

                // Timeout
                timeoutId = setTimeout(function() {
                    showJoinError('Room not found \u2014 check the code and try again');
                    cleanupPeer();
                    joinBtn.disabled = joinInput.value.length !== 4;
                }, 10000);

                conn.on('open', function() {
                    if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
                    joinError.textContent = '';
                    hostStatusEl.textContent = '';

                    // Show connected status in the join view
                    joinInput.style.display = 'none';
                    joinBtn.style.display = 'none';
                    joinError.style.display = 'none';
                    var statusDiv = document.createElement('div');
                    statusDiv.className = 'status-msg';
                    statusDiv.textContent = 'Connected! Starting...';
                    viewJoin.insertBefore(statusDiv, viewJoin.querySelector('.secondary'));

                    setTimeout(function() {
                        sessionStorage.setItem('fk_room', JSON.stringify({ code: code, role: 'client' }));
                        window.location.href = 'game.html';
                    }, 1000);
                });

                conn.on('error', function() {
                    showJoinError('Connection failed \u2014 please try again');
                    if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
                    joinBtn.disabled = joinInput.value.length !== 4;
                });
            });

            peer.on('error', function(err) {
                if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
                if (err.type === 'peer-unavailable') {
                    showJoinError('Room not found \u2014 check the code and try again');
                } else {
                    showJoinError('Connection failed \u2014 please try again');
                }
                joinBtn.disabled = joinInput.value.length !== 4;
            });
        };

        function showJoinError(msg) {
            joinError.textContent = msg;
            joinInput.classList.add('error');
            setTimeout(function() { joinInput.classList.remove('error'); }, 600);
        }

        window.cancelJoin = function() {
            cleanupPeer();
            joinInput.style.display = '';
            joinBtn.style.display = '';
            joinError.style.display = '';
            // Remove any injected status divs
            viewJoin.querySelectorAll('.status-msg').forEach(function(el) { el.remove(); });
            showView(viewMain);
        };
    })();
    </script>
</body>
</html>

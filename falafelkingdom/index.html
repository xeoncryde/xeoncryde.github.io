*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a0a00;font-family:'Segoe UI',Arial,sans-serif;user-select:none}
#c{display:block;width:100vw;height:100vh}
#hud{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);

  background:rgba(0,0,0,0.55);padding:8px 22px;border-radius:24px;

}
.hi{display:flex;align-items:center;gap:5px}
.hz{font-size:13px;color:#FFD700;font-weight:700}
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;

.title{font-size:clamp(36px,8vw,80px);font-weight:900;color:#FFD700;

.sub{font-size:clamp(14px,3vw,22px);color:#FFF8DC;
  text-shadow:2px 2px 0 rgba(0,0,0,0.5);margin-bottom:32px;text-align:center}
.btn{
  padding:14px 44px;font-size:22px;font-weight:800;
  background:#FFD700;color:#8B2500;border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 6px 0 #B8600B,0 0 20px rgba(255,215,0,0.4);
  transition:transform 0.1s,box-shadow 0.1s;margin:6px;
}
.btn:hover{transform:translateY(-3px);box-shadow:0 9px 0 #B8600B,0 0 25px rgba(255,215,0,0.5)}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 #B8600B}
.btn-red{background:#E74C3C;color:#fff;box-shadow:0 6px 0 #922B21}
.btn-red:hover{box-shadow:0 9px 0 #922B21}
.ctrl{

#cpflash{

  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

sun.position.set(20, 35, 15);
sun.castShadow = true;
sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
sun.shadow.camera.top =  50;  sun.shadow.camera.bottom = -50;
sun.shadow.camera.far = 400;
sun.shadow.mapSize.set(2048,2048);
scene.add(sun);
scene.add(sun.target);

fill.position.set(-10,5,-10);

// ── Audio ─────────────────────────────────────────────────────
let actx = null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f1,f2,dur,type='sine',vol=0.25){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;
    o.frequency.setValueAtTime(f1,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+dur);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function chord(fs,dur,vol=0.18){fs.forEach(f=>beep(f,f,dur,'sine',vol));}

// Each multi-note SFX stores its timeout IDs so rapid calls don't stack up.
let _sfxIds={};
function seqBeeps(key,notes,gap){
  (_sfxIds[key]||[]).forEach(id=>clearTimeout(id));
  _sfxIds[key]=notes.map(([f1,f2,d,v],i)=>setTimeout(()=>beep(f1,f2,d,'sine',v),i*gap));
}

function dist2(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return Math.sqrt(dx*dx+dy*dy);}
function dist3(a,b){const dx=a.x-b.x,dy=a.y-b.y,dz=(a.z||0)-(b.z||0);return Math.sqrt(dx*dx+dy*dy+dz*dz);}

function buildPlatforms(){
  PLAT_DEFS.forEach(d=>{
    const geo=new THREE.BoxGeometry(d.w,d.h,d.d);
    const mats=platMats(d.type==='ice'?'ice':d.mat);
    const mesh=new THREE.Mesh(geo,mats);
    const cx=d.x+d.w/2;
    mesh.position.set(cx,d.y,d.z||0);
    mesh.receiveShadow=true;
    scene.add(mesh);
    platforms.push({
      ...d,
      mesh,cx,cy:d.y,
      minX:d.x,maxX:d.x+d.w,
      minY:d.y-d.h/2,maxY:d.y+d.h/2,
      topY:d.y+d.h/2,
      startCX:cx,startCY:d.y,
      moveOffset:0,moveDir:1,
      crumbling:false,crumTimer:1.2,fallen:false,respTimer:0,
      active:true,
    });
  });
}

function buildHazards(){
  HAZ_DEFS.forEach(d=>{
    const group=new THREE.Group();
    if(d.type==='spike'){
      const n=Math.floor(d.w/0.85);
      for(let i=0;i<n;i++){
        const sg=new THREE.ConeGeometry(0.32,1.0,6);
        const sm=new THREE.MeshLambertMaterial({color:0xCC1100});
        const s=new THREE.Mesh(sg,sm);
        s.position.set(i*0.85-d.w/2+0.42,0.5,0);
        group.add(s);
      }
    } else {
      const geo=new THREE.PlaneGeometry(d.w,7);
      const mat=new THREE.MeshLambertMaterial({color:0xFF3300,emissive:new THREE.Color(0.4,0.05,0),transparent:true,opacity:0.88,side:THREE.DoubleSide});
      const m=new THREE.Mesh(geo,mat);
      m.rotation.x=-Math.PI/2;
      group.add(m);
      // glow ring effect
      const geo2=new THREE.PlaneGeometry(d.w,7);
      const mat2=new THREE.MeshBasicMaterial({color:0xFF6600,transparent:true,opacity:0.3,side:THREE.DoubleSide});
      const m2=new THREE.Mesh(geo2,mat2);
      m2.rotation.x=-Math.PI/2;
      m2.position.y=0.05;
      group.add(m2);
    }
    group.position.set(d.x+d.w/2,d.y,d.z||0);
    scene.add(group);
    hazards.push({
      ...d,mesh:group,
      minX:d.x,maxX:d.x+d.w,
      minY:d.y-0.4,maxY:d.y+(d.type==='spike'?1.3:0.4),
    });
  });
}

function buildCloud(x,y,z){
  const g=new THREE.Group();
  const pts=[[0,0,0,1.4],[1.6,0.3,0,1.1],[-1.5,0.2,0,1.0],[0.8,0.9,0,1.0],[-0.7,0.8,0,0.9]];
  pts.forEach(([px,py,pz,r])=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),new THREE.MeshLambertMaterial({color:0xEEEEEE}));
    m.position.set(px,py,pz);
    g.add(m);
  });
  g.position.set(x,y,z);
  scene.add(g);
}

function buildTree(x,y,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.32,2.2,7),new THREE.MeshLambertMaterial({color:0x3E2A1A}));
  trunk.position.y=1.1;
  g.add(trunk);
  for(let l=0;l<3;l++){
    const cone=new THREE.Mesh(new THREE.ConeGeometry(1.6-l*0.3,2.2,8),new THREE.MeshLambertMaterial({color:l===0?0x1A5C1A:0x267326}));
    cone.position.y=2.8+l*1.3;
    g.add(cone);
  }
  g.position.set(x,y,z);
  g.scale.setScalar(0.7+Math.random()*0.7);
  scene.add(g);
}

function spawnParticles(x,y,z,count,color){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(0.1,4,3);
    const mat=new THREE.MeshBasicMaterial({color,transparent:true});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*5;
    particles.push({mesh,vx:Math.cos(a)*spd*0.8,vy:3+Math.random()*5,vz:Math.sin(a)*1.5,life:1,max:1});
  }
}

function startGame(){
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('hud').style.display='flex';
  gs=GS.PLAY;
  // reset
  gd.hummus=0; gd.helped=0;
  gd.lastCP={x:5,y:3,z:0};
  P.x=5; P.y=3; P.z=0; P.vx=0; P.vy=0;
  P.onG=false; P.iTimer=0; P.facing=1;
  jumpBuf=0; eBuf=false;
  falafels.forEach(f=>{f.happy=false;f.bm.color.setHex(0x9A7858);f.bm.emissive.setHex(0);f.mesh.rotation.y=0;f.mesh.position.y=f.y;});
  jars.forEach(j=>{j.got=false;j.mesh.visible=true;});
  checkpoints.forEach(cp=>{cp.activated=false;cp.sm.color.setHex(0x00FF88);cp.sm.emissive.set(0,0.5,0.2);});
  bosses.forEach(b=>{b.defeated=false;b.mesh.visible=true;});
  Object.values(bridges).forEach(b=>{
    b.unlocked=false;b.appearing=false;b.appearT=0;
    b.tmat.opacity=0;b.smat.opacity=0;
    b.tmat.transparent=true;b.smat.transparent=true;
    if(b.addedToPlats){
      const idx=platforms.findIndex(pp=>pp.mesh===b.mesh);
      if(idx>-1)platforms.splice(idx,1);
      b.addedToPlats=false;
    }
  });
  platforms.forEach(p=>{
    if(p.type==='crumble'){
      p.fallen=false;p.crumbling=false;p.crumTimer=PC.CRUMBLE_DUR;
      p.mesh.visible=true;
      if(Array.isArray(p.mesh.material))p.mesh.material.forEach(m=>m.color&&m.color.setHex(0xA07020));
    }
  });
}

function pauseGame(){
  gs=GS.PAUSE;
  document.getElementById('pause-screen').style.display='flex';
}
function resumeGame(){
  gs=GS.PLAY;
  document.getElementById('pause-screen').style.display='none';
}
function triggerWin(){
  gs=GS.WIN;
  document.getElementById('hud').style.display='none';
  document.getElementById('win-screen').style.display='flex';
  SFX.victory();
  for(let i=0;i<6;i++) setTimeout(()=>spawnParticles(P.x,P.y+2,P.z,35,[0xFFD700,0xFF8C00,0x00FF88,0x00BFFF,0xFF69B4,0xFFFF00][i]),i*300);
}

// =============================================================
//  UNLOCK BRIDGE
// =============================================================
function unlockBridge(key){
  const b=bridges[key];
  if(!b||b.unlocked) return;
  b.unlocked=true; b.appearing=true; b.appearT=0;
  SFX.bridge();
  showMsg('✨ A bridge has appeared! ✨');
}

// =============================================================
//  COLLISION HELPERS
// =============================================================
function getPlatAABB(p){
  let minX=p.minX,maxX=p.maxX,minY=p.minY,maxY=p.maxY;
  if(p.type==='moving_h'){minX+=p.moveOffset;maxX+=p.moveOffset;}
  else if(p.type==='moving_v'){minY+=p.moveOffset;maxY+=p.moveOffset;}
  return{minX,maxX,minY,maxY,topY:maxY};
}

function resolveY(newY,oldY,vy){
  const hw=PC.HW, hh=PC.HH;
  let ry=newY, rvy=vy, onG=false, onIce=false;
  let platUnder=null;
  for(const p of platforms){
    if(!p.active||p.fallen) continue;
    const{minX,maxX,minY,maxY,topY}=getPlatAABB(p);
    // horizontal overlap (use current x)
    if(P.x+hw<=minX+0.05||P.x-hw>=maxX-0.05) continue;
    const bot=ry-hh, top=ry+hh;
    if(bot<maxY&&top>minY){
      if(vy<=0&&oldY-hh>=maxY-1.2){
        ry=maxY+hh; rvy=0; onG=true;
        if(p.type==='ice') onIce=true;
        platUnder=p;
      } else if(vy>0&&oldY+hh<=minY+1.2){
        ry=minY-hh; rvy=0;
      }
    }
  }
  return{ry,rvy,onG,onIce,platUnder};
}

function resolveX(newX,curY,vx){
  const hw=PC.HW,hh=PC.HH;
  let rx=newX,rvx=vx;
  for(const p of platforms){
    if(!p.active||p.fallen) continue;
    const{minX,maxX,minY,maxY}=getPlatAABB(p);
    if(curY+hh<=minY+0.05||curY-hh>=maxY-0.05) continue;
    const lft=rx-hw,rgt=rx+hw;
    if(lft<maxX&&rgt>minX){
      const ol=rgt-minX, or2=maxX-lft;
      if(ol<or2){rx=minX-hw;}else{rx=maxX+hw;}
      rvx=0;
    }
  }
  return{rx,rvx};
}

// =============================================================
//  INTERACTION
// =============================================================
function handleE(){
  // falafels
  for(const f of falafels){
    if(f.happy) continue;
    if(dist2(P.x,P.y,f.x,f.y)<3.5){
      if(gd.hummus>=f.cost){
        gd.hummus-=f.cost;
        makeFalafelHappy(f);
      } else {
        showMsg(`Need ${f.cost} 🫙! (have ${gd.hummus})`);
      }
      return;
    }
  }
  // bosses
  for(const b of bosses){
    if(b.defeated) continue;
    if(dist2(P.x,P.y,b.x,b.y)<3.5){
      if(gd.hummus>=b.need){
        defeatBoss(b);
      } else {
        showMsg(b.label+` (have ${gd.hummus})`);
      }
      return;
    }
  }
}

function makeFalafelHappy(f){
  f.happy=true; gd.helped++;
  f.bm.color.setHex(0xFFD700);
  f.bm.emissive.setHex(0x886600);
  spawnParticles(f.x,f.y+1,0,22,0xFFD700);
  spawnParticles(f.x,f.y+1,0,10,0xFF8C00);
  SFX.happy();
  showMsg(`😊 Falafel #${f.id} is happy! 🎉`);
  if(f.bridge) unlockBridge(f.bridge);
  if(gd.helped>=21) setTimeout(triggerWin,2000);
}

function defeatBoss(b){
  b.defeated=true; b.mesh.visible=false;
  spawnParticles(b.x,b.y+1.5,0,35,0xFFD700);
  spawnParticles(b.x,b.y+1.5,0,20,0xBB00FF);
  SFX.boss();
  if(b.type==='final'){
    showMsg('🎊 FINAL BOSS DEFEATED! Kindness reigns! 🎊');
    setTimeout(triggerWin,3000);
  } else {
    showMsg('✨ Bully defeated! Path is open! ✨');
  }
}

function respawn(loseHummus,teleport=true){
  const lost=Math.min(loseHummus,gd.hummus);
  gd.hummus=Math.max(0,gd.hummus-lost);
  if(teleport){
    P.x=gd.lastCP.x; P.y=gd.lastCP.y; P.z=gd.lastCP.z||0;
    P.vx=0; P.vy=0; P.onG=false;
  }
  P.iTimer=PC.ITIME;
  if(lost>0) showMsg(`💔 Lost ${lost} 🫙! (${gd.hummus} left)`);
}

// =============================================================
//  UPDATE PLAYER
// =============================================================
function updatePlayer(dt){
  if(gs!==GS.PLAY) return;
  P.iTimer=Math.max(0,P.iTimer-dt);
  jumpBuf=Math.max(0,jumpBuf-dt);

  const left=keys['ArrowLeft']||keys['KeyA'];
  const right=keys['ArrowRight']||keys['KeyD'];

  // Horizontal accel
  let tVx=0;
  if(right){tVx=PC.WSPD;P.facing=1;}
  if(left) {tVx=-PC.WSPD;P.facing=-1;}

  const isGnd=P.onG, isIce=P.onIce;
  const acc=isIce?PC.IACC:isGnd?PC.GACC:PC.AACC;
  const dec=isIce?PC.IDEC:isGnd?PC.GDEC:PC.ADEC;

  if(tVx!==0){
    P.vx=lerp(P.vx,tVx,dt*acc);
  } else {
    P.vx=lerp(P.vx,0,dt*dec);
    if(Math.abs(P.vx)<0.04) P.vx=0;
  }
  P.vx=Math.max(-PC.MHSPD,Math.min(PC.MHSPD,P.vx));

  // Jump
  const canJump=P.onG||(P.coyote>0);
  if(jumpBuf>0&&canJump){
    P.vy=PC.JVEL; P.onG=false; P.coyote=0; jumpBuf=0;
    P.isJump=true; P.jHold=0;
    SFX.jump();
  }
  // Variable jump hold
  if(P.isJump){
    if(keys['Space']&&P.vy>0&&P.jHold<PC.JHOLD){
      P.vy+=PC.JHFRC*dt; P.jHold+=dt;
    } else { P.isJump=false; }
  }

  // Gravity
  if(!P.onG){
    P.vy+=PC.GRAV*dt;
    P.vy=Math.max(PC.MFALL,P.vy);
  }

  // Coyote countdown
  P.coyote=Math.max(0,P.coyote-dt);

  // Move & resolve
  const newY=P.y+P.vy*dt;
  const{ry,rvy,onG,onIce,platUnder}=resolveY(newY,P.y,P.vy);

  // Crumble
  if(onG&&platUnder&&platUnder.type==='crumble'&&!platUnder.crumbling){
    platUnder.crumbling=true;
    if(Array.isArray(platUnder.mesh.material)){
      platUnder.mesh.material[2].color&&platUnder.mesh.material[2].color.setHex(0xFF6600);
    }
  }

  // Coyote — if was on ground, just left
  if(P.onG&&!onG) P.coyote=PC.COY;

  P.y=ry; P.vy=rvy; P.onG=onG; P.onIce=onIce;

  const newX=P.x+P.vx*dt;
  const{rx,rvx}=resolveX(newX,P.y,P.vx);
  P.x=rx; P.vx=rvx;

  // Moving platform carry
  for(const p of platforms){
    if(!p.active||p.fallen) continue;
    if(p.type!=='moving_h'&&p.type!=='moving_v') continue;
    const{minX,maxX,topY}=getPlatAABB(p);
    if(P.onG&&P.x+PC.HW>minX&&P.x-PC.HW<maxX&&Math.abs(P.y-PC.HH-topY)<0.15){
      if(p.type==='moving_h') P.x+=p.spd*p.moveDir*dt;
    }
  }

  // Void
  if(P.y<PC.VOID_Y){ respawn(PC.VOID_PENALTY); return; }

  // Hazards
  if(P.iTimer<=0){
    for(const h of hazards){
      if(P.x+PC.HW>h.minX&&P.x-PC.HW<h.maxX&&P.y+PC.HH>h.minY&&P.y-PC.HH<h.maxY){
        if(h.type==='lava'){ respawn(gd.hummus); }
        else { respawn(PC.SPIKE_PENALTY); }
        SFX.hurt(); return;
      }
    }
    // Boss contact
    for(const b of bosses){
      if(b.defeated) continue;
      if(dist2(P.x,P.y,b.x,b.y)<(b.type==='final'?2.0:1.5)){
        const dx=P.x-b.x;
        P.vx=(dx>=0?1:-1)*6; P.vy=5;
        respawn(PC.SPIKE_PENALTY,false); SFX.hurt(); P.iTimer=PC.ITIME; break;
      }
    }
  }

  // Collect hummus
  for(const j of jars){
    if(j.got) continue;
    if(Math.abs(P.x-j.x)<1.4&&Math.abs(P.y-j.y)<1.4&&Math.abs(P.z-(j.z||0))<2){
      j.got=true; j.mesh.visible=false;
      gd.hummus++; SFX.pickup();
    }
  }

  // Checkpoints
  for(const cp of checkpoints){
    if(cp.activated) continue;
    if(Math.abs(P.x-cp.x)<2.5&&Math.abs(P.y-cp.y)<3){
      cp.activated=true;
      gd.lastCP={x:cp.x,y:cp.y+1,z:0};
      cp.sm.color.setHex(0xFFFF00);
      cp.sm.emissive.set(0.5,0.4,0);
      showMsg('💚 Checkpoint saved!'); SFX.checkpoint(); flashCP();
    }
  }

  // E interact
  if(eBuf){ eBuf=false; handleE(); }

  // Interaction prompt
  let prompt='';
  for(const f of falafels){
    if(!f.happy&&dist2(P.x,P.y,f.x,f.y)<3.5){
      prompt=`Press E — give ${f.cost} 🫙 hummus to Falafel #${f.id}`;break;
    }
  }
  if(!prompt){
    for(const b of bosses){
      if(!b.defeated&&dist2(P.x,P.y,b.x,b.y)<3.5){ prompt=b.label; break; }
    }
  }
  const ip=document.getElementById('iprompt');
  ip.style.display=prompt?'block':'none';
  ip.textContent=prompt;
}

// =============================================================
//  UPDATE PLATFORMS
// =============================================================
function updatePlatforms(dt){
  for(const p of platforms){
    if(!p.active) continue;
    if(p.type==='moving_h'){
      p.moveOffset+=p.spd*p.moveDir*dt;
      if(Math.abs(p.moveOffset)>=p.range/2) p.moveDir*=-1;
      p.mesh.position.x=p.startCX+p.moveOffset;
    }
    if(p.type==='moving_v'){
      p.moveOffset+=p.spd*p.moveDir*dt;
      if(Math.abs(p.moveOffset)>=p.range/2) p.moveDir*=-1;
      p.mesh.position.y=p.startCY+p.moveOffset;
    }
    if(p.type==='crumble'){
      if(p.crumbling&&!p.fallen){
        p.crumTimer-=dt;
        // shake effect
        p.mesh.position.x=p.startCX+(Math.random()-0.5)*0.1*(1-p.crumTimer/PC.CRUMBLE_DUR);
        if(p.crumTimer<=0){
          p.fallen=true; p.mesh.visible=false; p.respTimer=PC.CRUMBLE_RESPAWN;
        }
      }
      if(p.fallen){
        p.respTimer-=dt;
        if(p.respTimer<=0){
          p.fallen=false; p.crumbling=false; p.crumTimer=PC.CRUMBLE_DUR;
          p.mesh.visible=true; p.mesh.position.x=p.startCX;
          if(Array.isArray(p.mesh.material))p.mesh.material.forEach(m=>m.color&&m.color.setHex(0xA07020));
        }
      }
    }
  }
}

// =============================================================
//  UPDATE BRIDGES
// =============================================================
function updateBridges(dt){
  Object.values(bridges).forEach(b=>{
    if(!b.appearing) return;
    b.appearT+=dt;
    const t=Math.min(1,b.appearT/1.2);
    b.tmat.opacity=t; b.smat.opacity=t;
    if(t>=1){
      b.appearing=false;
      b.tmat.transparent=false; b.smat.transparent=false;
    }
    if(!b.addedToPlats&&b.appearT>0.05){
      b.addedToPlats=true;
      platforms.push({
        x:b.x,y:b.y,w:b.w,h:b.h,d:b.d,type:'static',mat:'bridge',
        mesh:b.mesh,cx:b.cx,cy:b.y,
        minX:b.minX,maxX:b.maxX,minY:b.minY,maxY:b.maxY,topY:b.topY,
        startCX:b.cx,startCY:b.y,
        moveOffset:0,moveDir:1,spd:0,range:0,phase:0,
        crumbling:false,crumTimer:0,fallen:false,respTimer:0,
        active:true,
      });
    }
  });
}

// =============================================================
//  UPDATE FALAFELS
// =============================================================
function updateFalafels(dt,t){
  for(const f of falafels){
    if(f.happy){
      f.bobT+=dt*3.5;
      f.mesh.position.y=f.y+Math.sin(f.bobT)*0.32;
      f.mesh.rotation.y+=dt*2.2;
    } else {
      f.mesh.position.y=f.y+Math.sin(t*1.5+f.bobT)*0.06;
    }
  }
}

// =============================================================
//  UPDATE JARS
// =============================================================
function updateJars(dt,t){
  for(const j of jars){
    if(j.got) continue;
    j.mesh.rotation.y=t*1.8+j.spin;
    j.mesh.position.y=j.y+Math.sin(t*2+j.spin)*0.12;
  }
}

// =============================================================
//  UPDATE CHECKPOINTS
// =============================================================
function updateCheckpoints(dt,t){
  for(const cp of checkpoints){
    cp.ring.rotation.y=t+cp.phase;
    if(!cp.activated){
      cp.sm.opacity=0.6+Math.sin(t*3+cp.phase)*0.2;
    }
  }
}

// =============================================================
//  UPDATE BOSSES
// =============================================================
function updateBosses(dt,t){
  for(const b of bosses){
    if(b.defeated) continue;
    b.bobT+=dt*1.8;
    b.mesh.position.y=b.y+Math.sin(b.bobT)*0.18;
    b.mesh.rotation.y+=dt*1.2;
  }
}

// =============================================================
//  UPDATE PARTICLES
// =============================================================
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);continue;}
    p.vy-=14*dt;
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.y+=p.vy*dt;
    p.mesh.position.z+=p.vz*dt;
    const t=p.life/p.max;
    p.mesh.material.opacity=t;
    p.mesh.scale.setScalar(Math.max(0.01,t));
  }
}

// =============================================================
//  UPDATE PLAYER MESH
// =============================================================
let camX=5,camY=10,camTX=5,camTY=4;
function updatePlayerMesh(dt,t){
  if(!P.mesh) return;
  const bob=P.onG?Math.sin(t*8)*0.04:0;
  P.mesh.position.set(P.x,P.y+bob,P.z);
  const tr=P.facing===1?0:Math.PI;
  P.mesh.rotation.y=lerp(P.mesh.rotation.y,tr,dt*14);
  if(!P.onG){P.mesh.scale.set(0.92,1.08,0.92);}
  else{P.mesh.scale.lerp(new THREE.Vector3(1.06,0.94,1.06),dt*12);}
  // blink when invincible
  P.mesh.visible=P.iTimer<=0||Math.sin(t*22)>0;
}

// =============================================================
//  CAMERA
// =============================================================
const camLook=new THREE.Vector3();
function updateCamera(dt){
  camX=lerp(camX,P.x,dt*4.5);
  camY=lerp(camY,P.y+6,dt*3.5);
  camera.position.set(camX,camY,P.z+20);
  camLook.set(lerp(camLook.x,P.x,dt*5),lerp(camLook.y,P.y+2,dt*4),P.z);
  camera.lookAt(camLook);
  sun.position.set(camX+20,38,20);
  sun.target.position.set(camX,0,0);
  sun.target.updateMatrixWorld();
}

// =============================================================
//  HUD / BACKGROUND
// =============================================================
function updateHUD(){
  document.getElementById('hc').textContent=gd.hummus;
  document.getElementById('fc').textContent=gd.helped;
  const px=P.x;
  let zn='Zone 1: Falafel Village',bg=0x87CEEB,fg=0x87CEEB;
  if(px>=500){zn='Zone 3: Aurora Peak';bg=0x0D0020;fg=0x0D0020;}
  else if(px>=200){zn='Zone 2: Kindness Forest';bg=0x0A1F0A;fg=0x0A1F0A;}
  document.getElementById('zn').textContent=zn;
  renderer.setClearColor(bg);
  scene.fog.color.setHex(fg);
  if(window._smat) window._smat.color.setHex(bg);
}

// =============================================================
//  BUTTON HANDLERS
// =============================================================
document.getElementById('playBtn').addEventListener('click',()=>{ac();startGame();});
document.getElementById('resumeBtn').addEventListener('click',resumeGame);
document.getElementById('menuBtn').addEventListener('click',()=>{
  gs=GS.MENU;
  document.getElementById('pause-screen').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('menu-screen').style.display='flex';
});
document.getElementById('againBtn').addEventListener('click',()=>{
  document.getElementById('win-screen').style.display='none';
  startGame();
});

// =============================================================
//  INIT WORLD
// =============================================================
buildPlatforms();
buildHazards();
buildCheckpoints();
buildFalafels();
buildJars();
buildBosses();
buildBridges();
buildBackground();
buildPlayer();

// Camera init
camX=5; camY=10;

// =============================================================
//  MAIN LOOP
// =============================================================
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const sec=t/1000;
  const dt=Math.min((t-lastT)/1000,0.05);
  lastT=t;

  if(gs===GS.PLAY){
    updatePlayer(dt);
    updatePlatforms(dt);
    updateBridges(dt);
    updateFalafels(dt,sec);
    updateJars(dt,sec);
    updateCheckpoints(dt,sec);
    updateBosses(dt,sec);
    updatePlayerMesh(dt,sec);
    updateCamera(dt);
    updateParticles(dt);
    updateHUD();
    if(msgT>0){msgT-=dt;if(msgT<=0)document.getElementById('msg').style.display='none';}
  }
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falafel Kingdom - Co-op Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #08080f;
            color: #fff;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        canvas {
            display: block;
        }

        /* Speech bubble base styles */
        .fk-speech-bubble {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            transform: translate(-50%, -100%);
            background: #fffef0;
            border: 2.5px solid #c9a227;
            border-radius: 14px;
            padding: 8px 13px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #3a2a10;
            line-height: 1.45;
            box-shadow: 0 3px 14px rgba(0,0,0,0.35);
            white-space: nowrap;
            max-width: 250px;
            text-align: center;
            animation: bubblePop 0.18s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .fk-speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #c9a227;
        }
        .fk-speech-bubble.fading {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        @keyframes bubblePop {
            from { opacity: 0; transform: translate(-50%,-100%) scale(0.7); }
            to   { opacity: 1; transform: translate(-50%,-100%) scale(1); }
        }

        /* Confetti */
        .fk-confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in forwards;
            z-index: 100;
            pointer-events: none;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Loading screen */
        .fk-loading {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #0a0a12 0%, #12162a 50%, #1a1f35 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #fff;
        }
        .fk-loading h1 {
            font-size: 36px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .fk-loading .spinner {
            color: #c9a227;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .fk-loading .spinner::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%  { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <div class="fk-loading" id="loading-screen">
        <h1>FALAFEL KINGDOM</h1>
        <div class="spinner" id="loading-text">Connecting</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script src="js/network.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/player.js"></script>
    <script src="js/objects.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
